name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-core:
    name: Rust core (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: rustfmt
        run: cargo fmt --check
      - name: clippy (fast, no SQLCipher build)
        run: cargo clippy --no-default-features --all-targets -- -D warnings
      - name: test (fast layers)
        run: cargo test --no-default-features
      - name: test (with bundled SQLCipher — proves encrypted-at-rest path)
        run: cargo test

  frontend:
    name: Frontend (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: prettier
        run: pnpm format:check
      - name: typecheck
        run: pnpm -r typecheck
      - name: lint
        run: pnpm -r lint
      - name: test
        run: pnpm -r test

  companion-daemon:
    name: Companion daemon (notion-watcher)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install DBus dev headers (Secret Service keyring backend)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "companion/notion-watcher -> target"
      - name: rustfmt
        working-directory: companion/notion-watcher
        run: cargo fmt --check
      - name: clippy
        working-directory: companion/notion-watcher
        run: cargo clippy --all-targets -- -D warnings
      - name: build (release)
        working-directory: companion/notion-watcher
        run: cargo build --release

  companion-quickview:
    name: Companion app (notion-quickview, GTK4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK4 + libadwaita dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "companion/notion-quickview -> target"
      - name: rustfmt
        working-directory: companion/notion-quickview
        run: cargo fmt --check
      - name: build (release)
        working-directory: companion/notion-quickview
        run: cargo build --release

  gnome-extension:
    name: GNOME extension (schema + syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install glib schema compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev-bin || sudo apt-get install -y libglib2.0-bin
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Compile settings schema (strict)
        run: glib-compile-schemas --strict "companion/gnome-extension/notion-island@notion.app/schemas/"
      - name: Validate metadata.json
        run: node -e "JSON.parse(require('fs').readFileSync('companion/gnome-extension/notion-island@notion.app/metadata.json','utf8'))"
      - name: Syntax-check extension.js (ES module)
        run: |
          cp "companion/gnome-extension/notion-island@notion.app/extension.js" /tmp/ext-check.mjs
          node --check /tmp/ext-check.mjs

  open-notebook-cli:
    name: Open Notebook CLI (notion-cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install DBus dev headers (Secret Service keyring backend)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "open-notebook/notion-cli -> target"
      - name: rustfmt
        working-directory: open-notebook/notion-cli
        run: cargo fmt --check
      - name: clippy
        working-directory: open-notebook/notion-cli
        run: cargo clippy --all-targets -- -D warnings
      - name: build (release)
        working-directory: open-notebook/notion-cli
        run: cargo build --release

  open-notebook-mcp:
    name: Open Notebook MCP (notion-mcp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install DBus dev headers (Secret Service keyring backend)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "open-notebook/notion-mcp -> target"
      - name: rustfmt
        working-directory: open-notebook/notion-mcp
        run: cargo fmt --check
      - name: clippy
        working-directory: open-notebook/notion-mcp
        run: cargo clippy --all-targets -- -D warnings
      - name: build (release)
        working-directory: open-notebook/notion-mcp
        run: cargo build --release

  desktop:
    name: Desktop app (Tauri build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WebView + Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf build-essential \
            libdbus-1-dev
          # libdbus-1-dev: the app now publishes the SQLCipher key to the OS
          # keyring for the GNOME companion (notion-companion/keyring backend).
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build frontend (needed by generate_context!)
        run: pnpm --filter @notion/desktop build
      - name: rustfmt (src-tauri)
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check
      - name: clippy (src-tauri)
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: test (vault lifecycle, real SQLCipher)
        working-directory: apps/desktop/src-tauri
        run: cargo test
      - name: Bundle installable .deb
        run: pnpm --filter @notion/desktop exec tauri build --bundles deb
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: notion-desktop-deb
          path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

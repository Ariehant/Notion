name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-core:
    name: Rust core (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: rustfmt
        run: cargo fmt --check
      - name: clippy (fast, no SQLCipher build)
        run: cargo clippy --no-default-features --all-targets -- -D warnings
      - name: test (fast layers)
        run: cargo test --no-default-features
      - name: test (with bundled SQLCipher — proves encrypted-at-rest path)
        run: cargo test

  frontend:
    name: Frontend (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: prettier
        run: pnpm format:check
      - name: typecheck
        run: pnpm -r typecheck
      - name: lint
        run: pnpm -r lint
      - name: test
        run: pnpm -r test

  desktop:
    name: Desktop app (Tauri build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WebView + Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf build-essential
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build frontend (needed by generate_context!)
        run: pnpm --filter @notion/desktop build
      - name: rustfmt (src-tauri)
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check
      - name: clippy (src-tauri)
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: test (vault lifecycle, real SQLCipher)
        working-directory: apps/desktop/src-tauri
        run: cargo test
      - name: Bundle installable .deb
        run: pnpm --filter @notion/desktop exec tauri build --bundles deb
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: notion-desktop-deb
          path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

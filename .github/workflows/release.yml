name: Release (downloadable apps)

# Builds the desktop app on each OS's own runner and attaches the single-file,
# "download-and-run" artifacts to a GitHub Release:
#   * Windows  → NSIS installer .exe
#   * macOS    → .dmg
#   * Linux    → .AppImage (portable, no apt/sudo) + .deb
#
# Trigger it two ways:
#   * push a version tag  → `git tag v0.1.0 && git push origin v0.1.0`
#   * Actions tab → "Release (downloadable apps)" → Run workflow (enter a tag)
#
# The release is created as a DRAFT: review it, then click Publish and the
# binaries are downloadable from the repo's Releases page like any other app.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write # needed to create the Release and upload assets

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: "--bundles appimage,deb"
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: macos-latest
            args: "--bundles dmg"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebView + AppImage deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf build-essential \
            libdbus-1-dev libfuse2
          # libdbus-1-dev: the app publishes the SQLCipher key to the OS keyring.
          # libfuse2: required by AppImage bundling at package time.

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build + release the desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The Tauri project lives here; tauri-action finds src-tauri under it and
          # runs the `pnpm build` beforeBuildCommand to produce the frontend.
          projectPath: apps/desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Notion ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Desktop builds — download the file for your OS and run it (no build step):
            - **Windows**: `Notion_*_x64-setup.exe`
            - **macOS**: `Notion_*.dmg`
            - **Linux**: `Notion_*.AppImage` (portable — `chmod +x` then run) or `.deb`

            AI features are off by default; launch with `ENABLE_OPEN_NOTEBOOK=1` to
            enable them (see docs/OPEN_NOTEBOOK.md).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
